<!DOCTYPE html>
<html>
<head>
    <!-- This tells the browser to pretend the screen is 1920px wide -->
    <meta name="viewport" content="width=1920">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: #000; 
        }

        .desktop-wrapper {
            width: 1920px;   /* Standard Desktop Width */
            height: 1080px;  /* Standard Desktop Height */
            
            /* Zoom Math: 
               If your TV is 1080p, scale is 1.0. 
               If text is still too big, drop scale to 0.7 or 0.8 */
            transform: scale(1.0); 
            transform-origin: 0 0;
            position: absolute;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="desktop-wrapper">
        <!-- Add your URL here -->
        <iframe src="https://blbh.shulcloud.com/tv.php?&id=3813&user_id=15727716&hash=1e920e7d6a4492d6f57ffd8e739180886c4af925"></iframe>
    </div>
</body>
</html>
