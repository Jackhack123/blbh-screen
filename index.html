<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This line tricks the device into thinking it is a 1920px wide monitor -->
    <meta name="viewport" content="width=1920">
    <title>Desktop View Wrapper</title>
    <style>
        /* Ensure the page and the container fill the TV screen exactly */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Black background to avoid white flashes */
        }

        /* The container forces the internal browser to render at 1920px */
        .desktop-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* The iframe will now treat 100% width as the desktop width */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="desktop-container">
        <!-- REPLACE THE URL BELOW WITH YOUR WEBSITE -->
        <iframe src="https://blbh.shulcloud.com/tv.php?&id=3813&user_id=15727716&hash=1e920e7d6a4492d6f57ffd8e739180886c4af925
"></iframe>
    </div>
</body>
</html>
